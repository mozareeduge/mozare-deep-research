default:
  model: sonnet
  effort: medium
routes:
  lookup: {model: sonnet, effort: low, max_subagents: 0}
  close-read: {model: sonnet, effort: medium, max_subagents: 0}
  brief: {model: sonnet, effort: medium, max_subagents: 1}
  deep: {model: sonnet, effort: medium, max_subagents: 2, sequential_only: true}
  design: {model: sonnet, effort: medium, max_subagents: 2, sequential_only: true}
workers:
  research-scout: {model: haiku, effort: low, max_turns: 8}
  research-verifier: {model: sonnet, effort: medium, max_turns: 10}
forbidden_defaults: [max, ultracode, fable, agent-teams]
notes:
  - Use the current model alias available in the client; do not require a numbered Sonnet release.
  - Escalate effort only for a bounded consequential judgment, not for broad search.
